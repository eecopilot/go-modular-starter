services:
  app:
    profiles: ["app"]
    build:
      context: ..
      dockerfile: deployments/Dockerfile
    environment:
      APP_NAME: go-modular-starter
      APP_ENV: docker
      HTTP_ADDR: :8080
      LOG_FORMAT: json
      USERKIT_ENABLED: "true"
      USERKIT_DATABASE_URL: postgres://starter:starter@postgres:5432/starter?sslmode=disable
      USERKIT_JWT_SECRET: change-me-to-a-long-random-secret
      USERKIT_JWT_ISSUER: go-modular-starter
      USERKIT_JWT_AUDIENCE: go-modular-starter-users
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  migrate:
    profiles: ["app"]
    image: postgres:16-alpine
    environment:
      DATABASE_URL: postgres://starter:starter@postgres:5432/starter?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ../migrations:/migrations:ro
    command:
      - sh
      - -c
      - |
        for file in /migrations/*.sql; do
          echo "applying $$file"
          psql "$$DATABASE_URL" -v ON_ERROR_STOP=1 -f "$$file"
        done

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: starter
      POSTGRES_PASSWORD: starter
      POSTGRES_DB: starter
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U starter -d starter"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - starter-postgres-data:/var/lib/postgresql/data

volumes:
  starter-postgres-data:
