name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true

      - name: Test
        run: go test ./...

      - name: Vulnerability Check
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

      - name: Docker Compose Config
        run: docker compose -f deployments/docker-compose.yml --profile app config

      - name: Docker Build
        run: docker build -f deployments/Dockerfile -t go-modular-starter:ci .
